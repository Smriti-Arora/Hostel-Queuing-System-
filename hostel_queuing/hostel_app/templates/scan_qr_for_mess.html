{% extends "base.html" %}
{% block title %}Mess scan · HostelQueue{% endblock %}
{% block extra_head %}
<script src="https://unpkg.com/@zxing/library@0.21.3"></script>
{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>Mess attendance</h1>
    <p>Breakfast 7:30–9:00 · Lunch 12:30–14:00 · Dinner 19:30–21:00 (IST)</p>
  </div>
  <a class="btn btn-secondary" href="{% url 'mess_entry_list' %}">View log</a>
</div>

<div class="panel scanner-stage">
  <label class="form-field" style="max-width:280px">
    <span>Meal</span>
    <select id="meal" class="form-select">
      <option value="breakfast">Breakfast</option>
      <option value="lunch">Lunch</option>
      <option value="dinner">Dinner</option>
    </select>
  </label>
  <video id="video" class="scanner-video" muted playsinline></video>
  <div class="actions">
    <button class="btn btn-primary" id="startBtn" type="button">Start camera</button>
    <button class="btn btn-ghost" id="stopBtn" type="button">Stop</button>
  </div>
  <div id="scanResult" class="alert alert-info" style="display:none"></div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  const video = document.getElementById('video');
  const resultEl = document.getElementById('scanResult');
  const csrf = '{{ csrf_token }}';
  let codeReader = null;
  let controls = null;
  let busy = false;

  function showResult(data, ok) {
    resultEl.style.display = 'block';
    resultEl.className = 'alert ' + (ok ? 'alert-success' : 'alert-error');
    const timeLine = data.scanned_at ? `<div class="scan-time">Scanned at ${data.scanned_at}</div>` : '';
    resultEl.innerHTML = `<strong>${data.message || 'Done'}</strong>${timeLine}`;
  }

  async function handleScan(qrData) {
    if (busy) return;
    busy = true;
    const roll = (qrData || '').split(',')[0].trim();
    const body = new URLSearchParams();
    body.set('uni_roll_no', roll);
    body.set('meal', document.getElementById('meal').value);
    try {
      const res = await fetch('{% url "scan_qr_for_mess" %}', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
          'X-CSRFToken': csrf,
        },
        body,
      });
      const data = await res.json();
      showResult(data, !!data.success);
    } catch (e) {
      showResult({ message: 'Scan request failed' }, false);
    } finally {
      setTimeout(() => { busy = false; }, 1500);
    }
  }

  document.getElementById('startBtn').addEventListener('click', async () => {
    codeReader = new ZXing.BrowserQRCodeReader();
    controls = await codeReader.decodeFromVideoDevice(undefined, video, (result, err) => {
      if (result) handleScan(result.getText());
    });
  });

  document.getElementById('stopBtn').addEventListener('click', () => {
    if (controls) controls.stop();
    if (codeReader) codeReader.reset();
  });
</script>
{% endblock %}
