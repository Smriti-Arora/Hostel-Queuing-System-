<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Attendance System</title>
    <script src="https://unpkg.com/@zxing/library@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        #video { width: 100%; height: 400px; margin: 20px 0; background-color: #f3f3f3; }
        #feedback { margin-top: 20px; font-size: 18px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1 class="my-4">QR Code Attendance System</h1>

    <button class="btn btn-primary mb-4" onclick="openQrScanner()">Open QR Scanner</button>

    <div class="modal fade" id="qrScannerModal" tabindex="-1" role="dialog" aria-labelledby="qrScannerModalLabel" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="qrScannerModalLabel">QR Code Scanner</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close" onclick="closeScanner()">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <video id="video" playsinline autoplay></video>
                    <div id="qrResultMessage" style="margin-top: 20px;"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal" onclick="closeScanner()">Close</button>
                </div>
            </div>
        </div>
    </div>

    <p id="feedback" class="info">Scan a QR code to mark attendance.</p>

    <script>
        let videoStream = null;

        function openQrScanner() {
            const codeReader = new ZXing.BrowserQRCodeReader();

            $('#qrScannerModal').modal('show');

            navigator.mediaDevices.getUserMedia({ video: true })
                .then(function (stream) {
                    videoStream = stream;
                    const videoElement = document.getElementById('video');
                    videoElement.srcObject = stream;
                    videoElement.play();

                    codeReader.decodeFromVideoDevice(null, 'video', (result, err) => {
                        if (result) {
                            const qrCodeData = result.text;
                            console.log(`Scanned QR Code Data: ${qrCodeData}`);
                            markAttendance(qrCodeData);
                            stopVideoStream(videoStream);
                            closeScanner();
                        }
                    });
                })
                .catch(function (err) {
                    console.error('Error accessing webcam: ', err);
                    alert('Could not access webcam. Please enable permissions.');
                });
        }

        function stopVideoStream(stream) {
            let tracks = stream.getTracks();
            tracks.forEach(track => track.stop());
        }

        function markAttendance(qrCodeData) {
            fetch("{% url 'scan_qr' %}", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-CSRFToken": "{{ csrf_token }}",
                },
                body: JSON.stringify({ qr_data: qrCodeData }),
            })
            .then(response => response.json())
            .then(data => {
                const feedback = document.getElementById('feedback');
                feedback.textContent = data.message;

                if (data.success) {
                    feedback.className = "success";
                } else {
                    feedback.className = "error";
                }
            })
            .catch(error => {
                console.error("Error:", error);
                const feedback = document.getElementById('feedback');
                feedback.textContent = "An error occurred. Please try again.";
                feedback.className = "error";
            });
        }

        function closeScanner() {
            $('#qrScannerModal').modal('hide');
        }
    </script>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
